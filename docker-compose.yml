version: '3.8'

services:
  # Base de données PostgreSQL pour l'historique et l'inventaire
  db:
    image: postgres:15-alpine
    container_name: nre_postgres
    restart: always
    environment:
      POSTGRES_USER: nre_admin
      POSTGRES_PASSWORD: nre_password
      POSTGRES_DB: nre_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nre_admin -d nre_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis comme Broker pour Celery et cache rapide
  redis:
    image: redis:7-alpine
    container_name: nre_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


volumes:
  postgres_data:
  redis_data:
